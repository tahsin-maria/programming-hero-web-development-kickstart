<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="style.css">
<link rel="shortcut icon" href="flower-favicon.png" type="image/x-icon">
     <title>FLOWER | Home</title>
</head>
<body class="bg-slate-700 text-white p-4 m-2">

<header class="bg-[#fafa] flex justify-between items-center px-4 py-2">
    <img src="flower-favicon.png" alt="flower-favicon">

    <nav class="group relative">
    <button class="bg-purple-700 px-4 py-4 rounded-3xl text-[16px] hover:bg-emerald-400 cursor-pointer hover:text-black flex gap-2 active:bg-amber-800 focus:bg-green-500" type="submit">
        Menu
        <span class="inline-block group-hover:rotate-90">›</span>
    </button>

    <ul class="w-[200px] bg-slate-300 text-black rounded-[15px] p-2 font-stretch-semi-condensed space-y-2 group-hover:bg-red-200 absolute top-[42px] opacity-0 invisible group-hover:opacity-100 group-hover:visible transition duration-400 text-center -left-20 scale-5 group-hover:scale-90" >
        <li class="hover:bg-slate-400 p-2">Home</li>
        <li class="hover:bg-slate-400 p-2">Contact</li>
      <li class="hover:bg-slate-400 p-2">About Us</li>
        <li class="hover:bg-slate-400 p-2">Services</li>
    </ul>
    </nav>
</header>


<div class="bg-amber-500 rounded-md mt-4 h-[700px] relative overflow-hidden">
    <div class="bg-blue-400 w-[200px] h-[200px] absolute bottom-0 right-0">Absolute</div>
    <div class="bg-cyan-600 w-[200px] h-[200px]">Relative</div>
    <div class="bg-pink-600 w-[200px] h-[200px]">fixed</div>
       <div class="bg-purple-200 w-[200px] h-[200px] sticky top-0 right-0">sticky</div>
</div>

<section class="bg-fuchsia-200 p-6 rounded-md mt-4 h-[1000px] relative">
    <div class="flex bg-amber-400 h-[450px] items-center flex-col">
        <div class="bg-green-400 h-[100px] flex-1">
            flex 1
        </div>
        <div class="bg-red-500 h-[100px] flex-1">
            flex 2
        </div>
        <div class="bg-yellow-700 h-[100px] flex-1">
            flex 3
        </div>
    </div>


<div class="grid grid-cols-12 md:grid-cols-4 lg:grid-cols-1 bg-blue-400 ">
        <div class="bg-green-400 h-[100px] col-span-6">
            flex 1
        </div>
        <div class="bg-red-500 h-[100px] col-span-6">
            flex 2
        </div>
        <div class="bg-yellow-700 h-[100px] col-span-6">
            flex 3
        </div>
        <div class="bg-green-400 h-[100px] col-span-6">
            flex 1
        </div>
        <div class="bg-red-500 h-[100px] col-span-3">
            flex 2
        </div>
        <div class="bg-blue-700 h-[100px] col-span-9 md:bg-red-700 lg:bg-green-700">
            flex 3
        </div>
    </div>
</section>
















































































</body>
</html>
