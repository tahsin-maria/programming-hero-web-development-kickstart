<!--form-->
<div id="info-form">
    <form action="http://www.google.com"> <!---submits this form to google-->
        <fieldset> <!---to create diff groups-->
            <legend>Personal Info</legend><br> <!---to give that group a title-->

            <label for="first-name">First Name</label><br>
            <input required type="text" placeholder="Jonathan"><br><br>

            <label for="middle-name">Middle Name(optional)</label><br>
            <input type="text" placeholder="Brando"><br><br>


            <label for="last-name">Last Name</label><br>
            <input required type="text" placeholder="Joestar"><br><br>

            <label for="email-address">Email</label><br>
            <input required type="email"  placeholder="xyz@gmail.com"><br><br>

            <label for="age">Age</label><br>
            <input required type="number"  placeholder="18"><br><br>

            <label for="birthdate">Birthdate</label><br>
            <input required type="date"><br><br>

            <label for="password">Password</label><br>
            <input required type="password" autocomplete><br><br>

            <label for="gender">Gender</label><br><br>
            <input type="radio" name="gender" value="male">Male
            <input type="radio" name="gender" value="female">female<br><br>

            <label for="game">Select a game</label><br>
          <select name="game selection" id="game-select">
                <option value="football">Football</option>
                <option value="cricket">Cricket</option>
                <option value="tennis">Tennis</option>
          </select><br><br>

          <label for="file-uploading">upload file</label><br>
          <input type="file" required>
          <br><br>

            <textarea name="textarea" id="feedback-area" rows="10" cols="20">
                Enter your feedback
            </textarea>

        </fieldset>
        <br><br>
<button type="submit">submit</button><!---submit button is must-->
    </form><br><br>
