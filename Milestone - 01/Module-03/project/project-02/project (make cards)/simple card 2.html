<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <title>simple card</title>
    <link rel="stylesheet" href="simple card 2.css" >
  </head>
  <body>
    <div class="container">
      <div class="card">
        <img src="books.png" alt="img of books" >
        <div class="textbox">
          <h2>Books</h2>
          <p>
            It wasn’t until I started reading and found books they wouldn’t let
            us read in school that I discovered you could be insane and happy
            and have a good life without being like everybody else.
          </p>
        </div>
        <div class="amountbox">
            <div class="leftbox">
<div class="imgbox">
<img src="panda.png" alt="logo">
</div>
<div class="txt">
    <p>
        Number of books
    </p>
    <p class="secondp">
        10000+
    </p>
</div>
            </div>
            <div class="rightbox">
<a href="http:\\www.youtube.com">readbooks</a>
            </div>
        </div>
        <button type="button">
Read Books
        </button>
        <div class="cancel">
<a href="http:\\www.google.com">
    Back
</a>
        </div>
      </div>
    </div>
  </body>
</html>
